name: Collect & Publish

on:
  schedule:
    - cron: "0 23 * * *"   # 毎朝8:00 JST（UTC 23:00）
  workflow_dispatch:         # 手動実行ボタン

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Gmail 認証ファイルを設置
        env:
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          if [ -n "$GMAIL_CREDENTIALS" ] && [ -n "$GMAIL_TOKEN" ]; then
            echo "$GMAIL_CREDENTIALS" > gmail_credentials.json
            echo "$GMAIL_TOKEN"       > gmail_token.json
            echo "Gmail認証ファイルを設置しました"
          else
            echo "GMAIL_CREDENTIALS / GMAIL_TOKEN が未設定のためGmail収集をスキップします"
          fi

      - name: collect.py を実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect.py

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json index.html processed_emails.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 記事を自動更新 $(date '+%Y-%m-%d %H:%M JST' -d '+9 hours')"
            git push
          fi
