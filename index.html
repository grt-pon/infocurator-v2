でき、新規層へのリーチと既存顧客の関係深化を同時実現できる。", "so_what": "企業の周年記念は単なる企業主導の発表ではなく、顧客ストーリーを主役にしたUGC活用で世代を超えたエンゲージメントを生み出す機会となる。マンガやビジュアルコンテンツへの変換により、SNS拡散性が高まり、新規ユーザーへのブランド体験の可視化が実現される。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000135.000079439.html", "title": "猛暑対策に！片手で瞬時に開閉　ワンタッチ開閉 遮熱日傘　新発売のお知らせ", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:12:36.455244", "what": "片手で瞬時に開閉できるワンタッチ遮熱日傘の新商品発売。猛暑対策として利便性と機能性を両立させた日傘。", "why": "近年の気候変動により猛暑が深刻化し、熱中症予防ニーズが急速に高まっている。従来の日傘は両手操作が必要で利便性が低かったため、ワンタッチ機能という差別化で新規顧客層（特に移動中のビジネスパーソンや高齢者）を開拓する戦略。", "so_what": "消費者のペインポイント（手間・利便性）に焦点を当てた機能改善が新規需要を生み出す。季節的な社会課題（猛暑対策）と商品機能をダイレクトに結びつけることで、プロダクト主導の訴求が効果的。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000126.000020242.html", "title": "ポラリンでんきの第２弾CMはポラリンといっしょに歌って踊りたくなる『ポラリンソング』！", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:13:10.261317", "what": "北海道エリア専用電力サービス「ポラリンでんき」の第2弾CMキャンペーン。ユーザーが一緒に歌って踊りたくなる『ポラリンソング』を制作し、2026年4月29日より放送開始。", "why": "電力小売市場は競争が激化しており、認知度向上と親近感の醸成が重要。楽曲を活用したCMにより、ブランドの記憶に残りやすさを高め、ソーシャルメディアでの自発的な拡散を狙う。北海道という限定エリア向けサービスであるため、地域特性に合わせた愛着醸成が差別化戦略となる。", "so_what": "B2C企業における認知拡大施策では、単なる商品説明より『参加性』と『共有性』を持つコンテンツが効果的。楽曲やダンスなどの文化的要素は、ユーザーが自然と二次創作やSNS発信につながりやすく、低予算で高いリーチを実現できる。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000105.000073407.html", "title": "クリネックスやスコッティ商品を買って、使用後の空箱や芯を集めて応募する「Action for Smileキャンペーン2026」を今年度も5月1日から実施", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:13:43.474491", "what": "使用済みティシュー・トイレットペーパーの空箱や芯を回収し、応募することで社会貢献できるポイント制キャンペーン。消費者参加型のサステナビリティ施策。", "why": "紙製品メーカーとして環境配慮とブランドロイヤルティ向上が急務。使用後の容器回収により循環経済への取り組みを可視化し、サステナブル志向の消費者ニーズに応える。また定期購買製品の継続利用促進につながる。", "so_what": "消費者の『行動』を通じたエンゲージメント強化が効果的。単なる購入だけでなく、使用後のアクション参加により、ブランドとの関係性を深化させることができる。継続的なキャンペーン開催により、習慣化・リピート購買の仕組みが構築される。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000044.000171095.html", "title": "累計2,200社利用の広告データプラットフォーム「動画広告分析Pro」を提供するKASHIKA社に、AX代表・石綿文太が社外CAIOとして参画。AI駆動型マーケティングエージェントの共同開発体制を構築", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:14:17.032463", "what": "広告データプラットフォーム「動画広告分析Pro」の運営企業KASHIKAとAXが提携し、AI駆動型マーケティングエージェントを共同開発する体制を構築。AX代表がKASHIKAの社外CAIOとして参画。", "why": "動画広告市場の拡大に伴い、膨大な広告データの分析・最適化の需要が急増している一方、手作業による分析の限界が顕在化。AIを活用した自動化・高度な分析による意思決定支援が競争優位性を左右する時代に突入し、両社の強みを統合することで、マーケターの生産性向上を実現するプラットフォームが求められている。", "so_what": "データプラットフォームとAI技術の融合により、定性的な施策実行から定量的・自動化された意思決定へのパラダイムシフトが加速している。自社の広告最適化戦略において、単なるデータ収集ツールではなく、AI判断を組み込んだエージェント型のソリューション導入を検討する重要性が高まっている。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000035.000004894.html", "title": "イラストモデル/AI会話機能をリニューアル！FanLuv(ファンラブ)にて「リニューアルキャンペーン」開催のお知らせ", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:14:50.207573", "what": "FanLuv内のイラストモデルとAI会話機能をリニューアルし、ユーザー還元を目的とした「リニューアルキャンペーン」を実施する施策。", "why": "AI会話やキャラクター機能を備えたファンコミュニティプラットフォームが成熟する中で、機能の陳腐化を防ぎ、ユーザー体験を向上させる必要がある。リニューアルを機に既存ユーザーの満足度を高め、新規ユーザーの獲得機会を創出することで、プラットフォームの競争力を維持・強化する狙い。", "so_what": "プロダクト改善時には単なる機能刷新にとどまらず、キャンペーンを組み合わせてユーザーエンゲージメントを最大化することが重要である。既存ユーザーへのリテンション施策と新規獲得施策を同時実行することで、リニューアル効果を倍増させられる。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000184.000042292.html", "title": "大広 WEDO 菊地 優奈　WORLD AI FILM FESTIVAL 2026 in KYOTO AI CM部門にて審査員特別賞を受賞", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:15:24.143435", "what": "大広 WEDOの菊地優奈がAIを活用したCM制作で、京都開催のWorld AI Film Festival 2026のAI CM部門において審査員特別賞を受賞した。AIとクリエイティブの融合による映像制作の先進事例である。", "why": "生成AIの急速な普及に伴い、広告業界ではAI技術の創造的活用が差別化要因となっている。国際的なAI映像フェスティバルでの受賞は、大広グループのAI領域での技術力と創意性を業界に認知させる戦略的な機会である。また、京都での開催は日本の創意工夫をグローバルに発信する場として機能している。", "so_what": "マーケターはAI技術を単なる効率化ツールではなく、クリエイティブの質を高める戦略的資産として位置づけるべき。また、国際的な受賞・認証を獲得することで企業ブランドの信頼性と革新性を同時に強化できるため、業界賞への参加戦略も重要な施策となる。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000244.000097851.html", "title": "好評配信中の「ロマンシング サガ リ・ユニバース」、「ドラゴンクエストタクトコラボ記念 第2弾」を開催！", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:15:58.122461", "what": "「ロマンシング サガ リ・ユニバース」と「ドラゴンクエストタクト」のコラボレーション第2弾キャンペーン。双方のゲームユーザーを相互に獲得し、プレイヤーの継続率向上を狙った施策。", "why": "スマートフォンゲーム市場では新規ユーザー獲得コストが上昇しており、IPコラボは既存ユーザーベースを活用した効率的な拡大手段となっている。第2弾開催は初弾の成功を示唆し、スクウェア・エニックスの強力なIPポートフォリオを相互活用する戦略的提携である。既存ユーザーの離脱を防ぎながら新規層の獲得につながることで、長期的なLTV向上を期待できる。", "so_what": "IPコラボの反復実施は単なる販促ではなく、ユーザーエンゲージメント向上の重要な戦術。「第2弾」という打ち出しはコミュニティの期待値を醸成し、定期的な新規コンテンツ配信の仕組みを作ることで、プレイヤーの習慣化と継続購買を促進できる。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000247.000024344.html", "title": "【暗号資産取引ならビットバンク】最大 4,000 円相当の暗号資産がもらえる！EPOS CRYPTOカード for bitbank 発行記念キャンペーンを開催", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:16:31.767212", "what": "ビットバンクが新しいクレジットカード「EPOS CRYPTO card for bitbank」の発行を記念し、最大4,000円相当の暗号資産をプレゼントするキャンペーン。カード発行・利用を促進する獲得施策。", "why": "暗号資産市場の成長に伴い、取引所各社がユーザー数確保で競争が激化している。クレジットカード連携により金融商品としての利便性を高め、既存顧客層の拡大と新規ユーザーの取り込みが狙い。エポスカードとのコラボレーションで信用面での安心感も向上させている。", "so_what": "金融・fintech業界において、単なる機能提供ではなく『ギフト＋カード発行』の組み合わせが新規ユーザー獲得の定番パターンであることが示唆される。自社施策検討時は、パートナーシップによる信用補強と初期インセンティブの組み合わせ効果を検証する価値がある。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000249.000034082.html", "title": "TBWA HAKUHODOが企画・制作に携わっている「Smart Eye Camera」が世界三大広告賞「2026 Clio Awards」にて銅賞を受賞", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:17:05.912534", "what": "iPhoneを活用した眼科診療用医療機器「Smart Eye Camera」の企画・制作をTBWA HAKUHODOが手掛け、2026 Clio Awards（世界三大広告賞）で銅賞を受賞したキャンペーン。医療テクノロジーを可視化・認知させるためのマーケティング施策。", "why": "医療機器業界では、革新的なテクノロジーが存在しても認知度が低い課題が存在する。iPhoneという日常的なデバイスを活用した医療ソリューションは、アクセシビリティと利便性を訴求する点で差別化ポイントとなる。国際的な広告賞受賞により、ブランドの信頼性向上と医療従事者・患者層への認知拡大が期待できる。", "so_what": "B2B医療領域でも創意工夫と世界基準のクリエイティブにより国際的な評価を獲得できること、そして既存プロダクトとの組み合わせによるイノベーション訴求が効果的であることが示唆される。医療・テックカテゴリーのマーケターは、テクノロジーの実用性だけでなく、その導入の容易さや日常性をストーリー化することが重要である。"}, {"url": "https://prtimes.jp/main/html/rd/p/000000812.000118641.html", "title": "5月開始の「dポイント」「d払い」自治体キャンペーン", "source": "PR Times", "published": "", "collected_at": "2026-04-29T09:17:39.965695", "what": "NTTドコモが全国の自治体と連携して、5月から「dポイント」「d払い」を活用したポイント還元・割引キャンペーンを実施する施策。地域経済活性化と利用促進を同時に実現するプロモーション。", "why": "スマートフォン決済市場の競争激化により、既存ユーザーの囲い込みと新規獲得が急務である。自治体との協業により地域活性化への貢献をアピールでき、行政からの信頼獲得と利用者拡大を同時に達成できる。さらに地方での利用シーン拡大により、都市部以外でのサービス浸透を図る。", "so_what": "自治体などの公的機関との協業は、ブランド信頼性向上と新規ユーザー層の開拓に有効である。地域別・時期別のマイクロキャンペーンは、限定性を活かした高い参加率を生み出し、コンバージョン効率が高いマーケティング手法として検討の価値がある。"}, {"url": "https://markezine.jp/article/detail/50720", "title": "FLJ、フェアトレードの国内市場動向を発表　イオンなど約200社が連携するキャンペーンを5月に開始", "source": "MarkeZine", "published": "Tue, 28 Apr 2026 13:00:00 +0900", "collected_at": "2026-04-29T09:18:13.379547", "what": "フェアトレード推進の国内市場拡大キャンペーン。イオンなど約200社が連携して5月に展開する大規模なフェアトレード商品の認知・販売促進施策。", "why": "持続可能な社会への関心の高まりとESG経営への注目により、企業にはサステナビリティへの対応が求められている。消費者の倫理的消費への関心も急速に拡大している。複数企業の連携により、市場全体の底上げとフェアトレード認知の加速を狙う戦略的キャンペーン。", "so_what": "サステナビリティ領域では単一企業の施策より業界全体での連携キャンペーンが効果的。消費者教育と商品認知の両立が市場拡大の鍵となり、マーケターは『なぜフェアトレードか』という価値提案の共通化が重要。"}, {"url": "https://markezine.jp/article/detail/50699", "title": "リンクシェア・ジャパンのアフィリエイトネットワークに「OLIVE YOUNG」が広告主として参加", "source": "MarkeZine", "published": "Tue, 28 Apr 2026 08:45:00 +0900", "collected_at": "2026-04-29T09:18:47.491893", "what": "OLIVE YOUNGがリンクシェア・ジャパンのアフィリエイトネットワークに広告主として新規参加する施策。パフォーマンスマーケティングを通じた顧客獲得チャネルの拡大。", "why": "美容・コスメ市場の競争激化に対応するため、アフィリエイトという成果報酬型の低リスクな広告チャネルを活用。既存顧客層だけでなく、アフィリエイター経由で新規顧客層へのリーチを拡大する戦略。成熟した小売市場においてアフィリエイトは効率的なカスタマーアクイジションチャネルとして機能する。", "so_what": "アフィリエイトネットワークの参加企業が増加する傾向から、複数チャネルの組み合わせによるオムニチャネル施策の重要性が再確認できる。美容・コスメなどのカテゴリーではアフィリエイターの影響力が高いため、KOL・インフルエンサーとしてのアフィリエイター活用は重要な施策要素。"}, {"url": "https://markezine.jp/article/detail/50616", "title": "広告は「生成される」時代へ。Netflix・Nike・P&Gに学ぶリアルタイムパーソナライズの最前線", "source": "MarkeZine", "published": "Tue, 28 Apr 2026 07:00:00 +0900", "collected_at": "2026-04-29T09:19:21.559505", "what": "生成AIを活用したリアルタイムパーソナライズ広告の施策。ユーザーの行動・文脈・タイミングに応じて、広告クリエイティブそのものを動的に生成・変化させる手法。", "why": "従来のA/Bテスト型パーソナライズは、あらかじめ準備した複数案から「選ぶ」プロセスに限定されていた。生成AIの進化により、個別ユーザーごとに最適なコンテンツをリアルタイムで生成することが可能になり、広告効果とスケーラビリティの両立が実現できるようになった。Netflix・Nike・P&Gなどグローバル企業が導入を進める中、対応が競争優位性の源泉になりつつある。", "so_what": "マーケターは従来の「事前に複数案を用意→テストして選ぶ」という思考から、「リアルタイム生成」という新しいプロセス設計へシフトすべき。生成AIを広告運用に統合することで、膨大な個別パターンに対応でき、顧客体験と効率性の両方を向上させられる。"}, {"url": "https://markezine.jp/article/detail/50711", "title": "スイッチメディア、テレビCM×デジタル広告の売上効果を横断で可視化する新サービスを開始", "source": "MarkeZine", "published": "Fri, 24 Apr 2026 14:30:00 +0900", "collected_at": "2026-04-29T09:19:55.069440", "what": "テレビCMとデジタル広告の売上効果を統合的に測定・可視化するサービス。両媒体の相乗効果を含めた正確なROI分析が可能になる。", "why": "マーケターは従来、テレビとデジタルの効果を別々に測定していため、全体最適化ができていなかった。オムニチャネル時代に両媒体の相互作用を理解することが、広告投資効率化の鍵となっている。業界全体でアトリビューション分析ニーズが高まっており、差別化できるソリューションとして投入した。", "so_what": "マーケターは今後、テレビとデジタルを統合的に見ることで、無駄な重複投資を削減し、各施策の本当の貢献度を把握できる。媒体選択やバジェット配分の判断が、より データドリブンになる。"}, {"url": "https://markezine.jp/article/detail/50588", "title": "ログリー、AIエージェント向け広告運用フレームワーク「mureo」をオープンソースで公開", "source": "MarkeZine", "published": "Thu, 23 Apr 2026 11:30:00 +0900", "collected_at": "2026-04-29T09:20:29.395063", "what": "ログリーがAIエージェント向けの広告運用フレームワーク「mureo」をオープンソース化して公開する施策。AIエージェントが自動的に広告キャンペーンを最適化・運用できるシステムの開発を促進する取り組み。", "why": "AI技術の急速な発展に伴い、マーケティング業界でのAI活用が加速している中、企業が独占的な技術開発よりもエコシステム構築を優先する戦略シフトが起きている。オープンソース化により開発者コミュニティを巻き込み、業界全体での技術標準化と自社技術の認知度向上を目指している。デジタル広告市場の効率化ニーズが高まる中で、先行者としてのポジショニングを強化できる。", "so_what": "マーケターはオープンソース提供によって、企業は技術的ハードルを下げながら自社のブランド価値と影響力を高められることを学べる。また、AI広告運用の自動化がこれまで以上に実現可能になることで、マーケターのスキル構成が変わり、戦術実行よりも戦略立案と創造的な施策企画にシフトする必要性が増す。"}, {"url": "https://www.advertimes.com/20260428/article542864/?utm_source=feed", "title": "LUUPが広告事業に参入　原宿を令和ロマン×9090がジャック", "source": "AdverTimes", "published": "Tue, 28 Apr 2026 08:32:12 +0000", "collected_at": "2026-04-29T09:21:05.133149", "what": "電動キックボードシェアリングサービス「LUUP」が広告事業に参入。第一弾として、アパレルブランド「9090」が原宿エリアでお笑いコンビ・令和ロマンを起用したプロモーション施策を展開する。", "why": "LUUPは都市部での高い利用者接触機会と移動データを保有しており、これを広告インベントリとして活用することで新規事業化を図っている。アパレルブランド側も若年層が多く行き交う原宿での話題性の高い施策を求めており、双方のニーズが合致。ユーザーの移動ルート上での接触により、ターゲット層への効率的なリーチが実現できる。", "so_what": "既存のサービスインフラをメディア化する「二次利用」戦略は、プラットフォーム企業の新たな収益源となる。マーケターは自社顧客の接触機会を創出するため、単なる商品・サービス提供者ではなく、ユーザーが日常的に利用するインフラやプラットフォームとのパートナーシップを検討することが重要。"}, {"url": "https://www.advertimes.com/20260428/article542674/?utm_source=feed", "title": "“理想の親じゃなくていい” 調査結果も公開、ガーナチョコレートが『ONE PIECE』と共に母の日・父の日の応援広告", "source": "AdverTimes", "published": "Tue, 28 Apr 2026 06:25:18 +0000", "collected_at": "2026-04-29T09:21:38.940964", "what": "ロッテのガーナチョコレートが『ONE PIECE』とコラボレーションし、母の日・父の日向けの応援広告キャンペーンを実施。「理想の親じゃなくていい」というメッセージで、親子関係を肯定するテーマで展開している。", "why": "母の日・父の日は親への感謝を示す機会で高い購買意欲が生まれる時期。人気アニメIPとのコラボにより若年層を含む幅広い層へのリーチが可能。また、完璧な親像ではなく現実的な親子関係を肯定するメッセージは、多くの消費者の共感を獲得しやすく、ブランドへの好感度向上につながる。", "so_what": "季節商材の販促において、有名IPとのコラボレーションで認知拡大と親和性向上を同時に実現できる。また、社会調査結果を組み込むことで、単なる商品宣伝ではなく社会的メッセージを持つキャンペーンとして報道価値を高め、メディア露出を増加させることができる。"}, {"url": "https://www.advertimes.com/20260428/article542727/?utm_source=feed", "title": "【ダイアン津田CMまとめ】「ゴイゴイスー」でひっぱりだこ！日産・出前館・ユニクロなど最新事例を紹介", "source": "AdverTimes", "published": "Tue, 28 Apr 2026 03:34:17 +0000", "collected_at": "2026-04-29T09:22:12.273326", "what": "ダイアン津田篤宏を起用したCM・広告施策の事例分析。「ゴイゴイスー」などのキャラクター性を活かした複数企業の広告を紹介。", "why": "バラエティ番組での人気により津田が高い認知度と親しみやすさを獲得し、その特徴的なキャラクターが様々なブランドとの相乗効果を生む。タレント起用の効率性が高まっている中で、ユニークなキャラクター資産を持つ人物への注目が業界で集まっている。", "so_what": "タレント起用の際は、単なる知名度より『既存のキャラクター資産をブランドにどう活かすか』という視点が重要。バラエティでの定着キャラを広告に転用することで、視聴者の親近感を活用した効果的なブランド連想が可能になる。"}, {"url": "https://www.advertimes.com/20260428/article542621/?utm_source=feed", "title": "黄色い自販機とベンチ設置、ジョージアCMの “休憩” 再現「進みつづけるために。ジブンをときどき圏外へ。」", "source": "AdverTimes", "published": "Tue, 28 Apr 2026 01:00:59 +0000", "collected_at": "2026-04-29T09:22:45.917334", "what": "ジョージアの主要製品リニューアルに伴う統合キャンペーン。黄色い自販機とベンチを設置して、CMの「休憩」シーンを現実に再現し、自販機での飲用習慣の価値を提案する施策。", "why": "仕事中に缶コーヒーを飲む男性ユーザーが増加し、単なる飲料から『立ち止まって自分を見つめ直す時間』という体験価値への需要が高まっている。製品リニューアルのタイミングで、ブランドメッセージを体験型で伝えることで、競合他社との差別化と顧客ロイヤルティ向上を狙う戦略。", "so_what": "テレビCMの世界観を自販機という日常接点で実体験させることで、単なる広告認知から行動変容へ導くことができる。また、『圏外へ』というメッセージは、デジタル過剰時代のターゲットに響く内省的価値観を訴求し、ブランドとの感情的結合を深める効果がある。"}, {"url": "https://www.advertimes.com/20260427/article542242/?utm_source=feed", "title": "平和を考え “ハット星人”登場　あえて実写IPでブランドイメージ醸成目指す", "source": "AdverTimes", "published": "Fri, 24 Apr 2026 05:36:40 +0000", "collected_at": "2026-04-29T09:25:01.959839", "what": "ピザハットが新キャラクター「ハット星人」を起用したテレビCM3篇を展開し、「JOYすぎるピザハット」というブランドコンセプトを打ち出すキャンペーン。実写IPを活用したブランドイメージ構築施策。", "why": "食品業界では感情的な訴求が購買意欲につながりやすく、特に若年層へのアプローチが重要。キャラクター化による反復接触でブランド認知・親近感を醸成する戦略が有効。実写IPはCGより親近感と信頼性が高く、バイラル効果も期待できるため。", "so_what": "ブランドイメージ構築では、ロゴやカラーだけでなくキャラクターという『物語性を持つ資産』を活用することで、複数接点での一貫したメッセージ伝達が可能になる。感情的な『JOY』という軸を統一することで、商品スペックではなくブランド体験として消費者に記憶される。"}];

let allArticles = ARTICLES_DATA.map((a, i) => ({ ...a, _id: i }));

function sourceClass(source) {
  const map = {
    'MarkeZine':      'markezine',
    'AdverTimes':     'advertimes',
    'DIGIDAY':        'digiday',
    'ITmedia':        'itmedia',
    '日経クロストレンド': 'nikkei',
  };
  return map[source] || '';
}

function formatDate(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch { return raw; }
}

function createCard(article) {
  const card = document.createElement('div');
  card.className = 'card';

  const sections = [
    { key: 'what',    label: 'What',    iconClass: 'what-icon',    icon: 'W' },
    { key: 'why',     label: 'Why',     iconClass: 'why-icon',     icon: 'W' },
    { key: 'so_what', label: 'So What', iconClass: 'sowhat-icon',  icon: 'S' },
  ];

  const accordionHTML = sections.map(({ key, label, iconClass, icon }) => {
    const text = (article[key] || '情報なし').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `
      <div class="accordion-item">
        <button class="accordion-btn" data-key="${key}">
          <span class="label-icon ${iconClass}">${icon}</span>
          ${label}
          <span class="chevron">&#9660;</span>
        </button>
        <div class="accordion-body" id="body-${key}-${article._id}">
          <p>${text.replace(/\n/g, '<br>')}</p>
        </div>
      </div>`;
  }).join('');

  const safeTitle = article.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const webBadge = article.web_searched
    ? '<span class="web-search-badge">&#128269; Web検索で分析</span>'
    : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="meta">
        <span class="source-tag ${sourceClass(article.source)}">${article.source}</span>
        ${webBadge}
        <span class="date">${formatDate(article.published)}</span>
      </div>
      <div class="card-title">
        <a href="${article.url}" target="_blank" rel="noopener">${safeTitle}</a>
      </div>
    </div>
    <div class="analysis">${accordionHTML}</div>`;

  card.querySelectorAll('.accordion-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = document.getElementById(`body-${btn.dataset.key}-${article._id}`);
      btn.classList.toggle('open');
      body.classList.toggle('open');
    });
  });

  return card;
}

function render(articles) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('countBadge').textContent = articles.length + ' 件';

  if (articles.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <h3>記事が見つかりません</h3>
        <p>検索条件を変えるか、python collect.py を実行してください。</p>
      </div>`;
    return;
  }

  const fragment = document.createDocumentFragment();
  articles.forEach(a => fragment.appendChild(createCard(a)));
  grid.appendChild(fragment);
}

function filter() {
  const query  = document.getElementById('search').value.toLowerCase();
  const source = document.getElementById('sourceFilter').value;
  const filtered = allArticles.filter(a => {
    const matchSource = !source || a.source === source;
    const matchQuery  = !query ||
      a.title.toLowerCase().includes(query) ||
      (a.what    || '').toLowerCase().includes(query) ||
      (a.why     || '').toLowerCase().includes(query) ||
      (a.so_what || '').toLowerCase().includes(query);
    return matchSource && matchQuery;
  });
  render(filtered);
}

document.getElementById('search').addEventListener('input', filter);
document.getElementById('sourceFilter').addEventListener('change', filter);

render(allArticles);
</script>
</body>
</html>
